# Environment configuration for dual-humanoid interaction tracking without contact features
# Based on env_im_interx_multirl.yaml with termination conditions from multirl2

task: HumanoidImInterx
motion_file: ""
num_envs: 1024
env_spacing: 5.0
episode_length: 300
debug_partner_obs: false

# Interaction-specific settings
humanoid_number: 2
interaction_mode: true
partner_obs_v: 2  # Standard partner observation version without contact
self_obs_v: 1     # Standard self observation version without contact
interx_data_path: "../PHC/sample_data/interx_processed_fixed_v5.pkl"

# Motion and tracking settings
fut_tracks: false
fut_tracks_dropout: false
obs_v: 6
auto_pmcp: false
auto_pmcp_soft: false
eval_full: false

# Reward settings
power_reward: true
power_scale: 1.0
power_coefficient: 0.0005

# Hand contact reward settings
hand_contact_reward_weight: 1
hand_contact_force_threshold: 0.1

# Control settings
control_mode: "isaac_pd"
pdControl: true
controlFrequencyInv: 2
kp_scale: 1

# State initialization
stateInit: "Random"
hybridInitProb: 0.5
numAMPObsSteps: 10

# Observation settings
local_root_obs: true
rootHeightObs: true
key_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe", "R_Wrist", "L_Wrist"]

# Contact bodies - foot contact only (no hand contact)
contact_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe"]

# Reset and termination settings
# 協力起き上がり用設定：手の詳細な追跡を緩和し、主要関節に集中 (from multirl2)
reset_bodies: ['Pelvis', 'L_Hip', 'L_Knee', 'L_Ankle', 'R_Hip', 'R_Knee', 'R_Ankle', 'Torso', 'Spine', 'Chest', 'Neck', 'Head', 'L_Thorax', 'L_Shoulder', 'R_Thorax', 'R_Shoulder']

# Termination conditions from multirl2 (relaxed)
terminationHeight: 0.15
enableEarlyTermination: true
terminationDistance: 0.5

# Trajectory settings
numTrajSamples: 10
trajSampleTimestepInv: 5
enableTaskObs: true

# Asset settings
asset:
  assetRoot: "/"
  assetFileName: "mjcf/smplx_humanoid.xml"

# Plane settings
plane:
  staticFriction: 1.0
  dynamicFriction: 1.0
  restitution: 0.0

# Shape settings
has_shape_obs: false
has_shape_obs_disc: false
has_shape_variation: false
shape_resampling_interval: 250

# Primitive settings
num_prim: 1
training_prim: 0
actors_to_load: 0

# Flags
isFlagrun: false
enable_debug_vis: false
cycle_motion: true
hard_negative: false
fitting: true
only_kin_loss: false
distill: false
save_kin_info: false
distill_z_model: false
z_read: false
real_weight: true
remove_toe_im: false