# Humanx HHI-Assist Bed Environment configuration
# Simplified dual-humanoid interaction using concatenated observations with bed
# Input: self_obs + task_obs + partner_self_obs + partner_task_obs
# Network: Simple MLP via PNN with num_prim=1
# Based on HumanoidImHumanxHelpUpBed task with bed support

task: HumanoidImHumanxHelpUpBed
motion_file: ""
num_envs: 1024
env_spacing: 5.0
episode_length: 300
debug_partner_obs: false

# Interaction-specific settings
humanoid_number: 2  # 2 humanoids per pair
interaction_mode: true
partner_obs_v: 3  # Basic partner observation
self_obs_v: 5
enable_wrist_relative_obs: true
hhi_assist_bed_data_path: "../PHC/sample_data/hhi-assist_processed_v6_AACG_RMCR_FullAssist_Take2.pkl"

# Motion and tracking settings
fut_tracks: false
fut_tracks_dropout: false
obs_v: 6
auto_pmcp: false
auto_pmcp_soft: true
failed_motion_weight: false
failed_weight_multiplier: 2.0
eval_full: false

# Reward settings
power_reward: true
power_scale: 1.0
power_coefficient: 0.0005
caregiver_power_coefficient: 0.0005
recipient_power_coefficient: 0.001

caregiver_torque_reduction_reward: true

# New reward to prevent caregiver from touching recipient head
caregiver_touch_head_reward: false
caregiver_touch_head_coefficient: 0.01
caregiver_touch_threshold: 0.1

# Hand contact reward settings
hand_contact_reward_weight: 1.0
hand_contact_force_threshold: 0.1

# Role-aware tracking reward curriculum settings
caregiver_initial_weight: 0.0
caregiver_final_weight: 0.0
caregiver_curriculum_epoch: 0

# Control settings
control_mode: "isaac_pd"
pdControl: true
controlFrequencyInv: 2
kp_scale: 1

# State initialization
stateInit: "Start"
hybridInitProb: 0.5
numAMPObsSteps: 10

# Motion sampling settings
seq_motions: false

# Observation settings
local_root_obs: true
rootHeightObs: true
key_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe", "R_Wrist", "L_Wrist"]

# Contact bodies
contact_bodies: [
    "R_Ankle", "L_Ankle", "R_Toe", "L_Toe",
    "R_Wrist", "L_Wrist",
    "R_Index3", "L_Index3",
    "R_Middle3", "L_Middle3",
    "R_Ring3", "L_Ring3",
    "R_Pinky3", "L_Pinky3",
    "R_Thumb3", "L_Thumb3"
]

# Hand contact specific settings
hand_contact_enabled: true
hand_contact_threshold: 10
hand_contact_bodies: ["R_Wrist", "L_Wrist", "R_Index3", "L_Index3", "R_Middle3", "L_Middle3", "R_Ring3", "L_Ring3", "R_Pinky3", "L_Pinky3", "R_Thumb3", "L_Thumb3"]

# Reference contact difference feature
reference_contact_enabled: true
reference_contact_debug: false

# Role flags feature
role_flags_enabled: true

# Reset and termination settings
reset_bodies: ['Pelvis', 'L_Hip', 'R_Hip', 'Torso', 'Spine', 'Chest', 'Neck', 'Head', 'L_Thorax', 'L_Shoulder', 'R_Thorax', 'R_Shoulder', 'L_Knee', 'R_Knee', 'L_Ankle', 'R_Ankle']

# Termination conditions
terminationHeight: 0.15
enableEarlyTermination: true
terminationDistance: 0.25  # Caregiver termination distance
terminationDistanceRecipient: 0.25  # Recipient termination distance

ankle_height_termination_threshold: 1000 # Nullify the termination condition

# Trajectory settings
numTrajSamples: 10
trajSampleTimestepInv: 5
enableTaskObs: true

# Asset settings
asset:
  assetRoot: "/"
  assetFileName: "mjcf/smplx_humanoid.xml"

# Furniture asset settings
asset_name: "bed"  # Options: "bed" or "chair"

# Mass scaling for recipient
recipient_mass_scale: 0.7

# Plane settings
plane:
  staticFriction: 1.0
  dynamicFriction: 1.0
  restitution: 0.0

# Shape settings
has_shape_obs: false
has_shape_obs_disc: false
has_shape_variation: false
shape_resampling_interval: 250

# Primitive settings - Single primitive for humanx
num_prim: 1
training_prim: 0
actors_to_load: 0

# Flags
isFlagrun: false
enable_debug_vis: false
cycle_motion: false
hard_negative: false
fitting: false
only_kin_loss: false
distill: false
save_kin_info: false
distill_z_model: false
z_read: false
real_weight: true
remove_toe_im: false

# SimpleLiftUp specific settings
simple_lift_up_mode: true
task_reward_only: true
dense_height_reward: true

# Head height reward
head_height_reward_scale: 1.0

# Hand contact validation settings
zero_reward_on_poor_contact: false
min_required_hand_contacts: 10

# Partner relative position reward settings
partner_rel_pos_weight: 0.0
partner_rel_pos_k: 4.0

# Random position offset disabled
zero_out_far: false
zero_out_far_train: false
cycle_motion_xp: false

# SMPL Model Configuration
smpl_type: smplx

# Trajectory tracking settings (RSI)
trajectory_tracking_pairs: 10

# Recipient assist force settings
recipient_assist_enabled: false
caregiver_assist_enabled: false
recipient_assist_kp_pos: 3000.0
recipient_assist_kd_pos: 1000.0
caregiver_assist_kp_pos: 3000.0
caregiver_assist_kd_pos: 1000.0

# Curriculum learning settings
curriculum_start_epoch: 100
curriculum_duration_epochs: 500
curriculum_kp_pos_final: 0.0
curriculum_kd_pos_final: 0.0

