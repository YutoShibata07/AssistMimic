# Environment configuration for dual-humanoid interaction tracking
# Based on standard env_im.yaml with minimal changes

task: HumanoidImInterx
motion_file: ""
num_envs: 128
env_spacing: 5.0
episode_length: 300

# Interaction-specific settings
humanoid_number: 2  # Number of humanoids per interaction pair
interaction_mode: true

# Motion and tracking settings - use standard settings
fut_tracks: false
fut_tracks_dropout: false
obs_v: 6
auto_pmcp: false
auto_pmcp_soft: false
eval_full: false

# Reward settings
power_reward: true
power_scale: 1.0
power_coefficient: 0.0005

# Control settings
control_mode: "isaac_pd"
pdControl: true
controlFrequencyInv: 2  # 30 Hz
kp_scale: 1

# State initialization
stateInit: "Random"
hybridInitProb: 0.5
numAMPObsSteps: 10

# Observation settings
local_root_obs: true
rootHeightObs: true
key_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe", "R_Wrist", "L_Wrist"]
contact_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe"]

# Reset and termination settings
reset_bodies: ['Pelvis', 'L_Hip', 'L_Knee', 'L_Ankle', 'R_Hip', 'R_Knee', 'R_Ankle', 'Torso', 'Spine', 'Chest', 'Neck', 'Head', 'L_Thorax', 'L_Shoulder', 'L_Elbow', 'L_Wrist', 'L_Index1', 'L_Index2', 'L_Index3', 'L_Middle1', 'L_Middle2', 'L_Middle3', 'L_Pinky1', 'L_Pinky2', 'L_Pinky3', 'L_Ring1', 'L_Ring2', 'L_Ring3', 'L_Thumb1', 'L_Thumb2', 'L_Thumb3', 'R_Thorax', 'R_Shoulder', 'R_Elbow', 'R_Wrist', 'R_Index1', 'R_Index2', 'R_Index3', 'R_Middle1', 'R_Middle2', 'R_Middle3', 'R_Pinky1', 'R_Pinky2', 'R_Pinky3', 'R_Ring1', 'R_Ring2', 'R_Ring3', 'R_Thumb1', 'R_Thumb2', 'R_Thumb3']
terminationHeight: 0.15
enableEarlyTermination: true
terminationDistance: 0.25

# Trajectory settings
numTrajSamples: 10
trajSampleTimestepInv: 5
enableTaskObs: true

# Asset settings
asset:
  assetRoot: "/"
  assetFileName: "mjcf/smplx_humanoid.xml"

# Plane settings
plane:
  staticFriction: 1.0
  dynamicFriction: 1.0
  restitution: 0.0

# Shape settings
has_shape_obs: false
has_shape_obs_disc: false
has_shape_variation: false
shape_resampling_interval: 250

# Primitive settings
num_prim: 1
training_prim: 0
actors_to_load: 0  # Number of pre-trained actors to load from checkpoint

# Flags
isFlagrun: false
enable_debug_vis: false
cycle_motion: true
hard_negative: false
fitting: true
only_kin_loss: true
distill: false
save_kin_info: false
distill_z_model: false
z_read: false
real_weight: true
remove_toe_im: false  # For imitation